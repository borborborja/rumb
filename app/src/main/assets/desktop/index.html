<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rumb · Escriptori</title>
<link rel="stylesheet" href="leaflet.css">
<link rel="stylesheet" href="app.css">
</head>
<body>

<!-- Login gate -->
<div id="login" class="login hidden">
  <form id="loginForm" class="login-box">
    <div class="brand">Rumb</div>
    <p class="login-hint">Introdueix el PIN</p>
    <input id="pin" class="pin-input" type="password" inputmode="numeric" pattern="[0-9]*"
           maxlength="8" autocomplete="off" placeholder="····">
    <button type="submit" class="btn btn-primary">Entrar</button>
    <div id="loginError" class="login-error hidden">PIN incorrecte</div>
  </form>
</div>

<!-- App shell -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="brand">Rumb <span class="brand-sub">escriptori</span></div>
    <nav id="tabs" class="tabs">
      <button class="tab" data-tab="library" data-icon="library"><span>Biblioteca</span></button>
      <button class="tab" data-tab="routes" data-icon="routes"><span>Per seguir</span></button>
      <button class="tab" data-tab="competition" data-icon="competition"><span>Competició</span></button>
      <button class="tab" data-tab="records" data-icon="records"><span>Rècords</span></button>
      <button class="tab" data-tab="progress" data-icon="progress"><span>Progrés</span></button>
      <button class="tab" data-tab="settings" data-icon="settings"><span>Ajustes</span></button>
    </nav>
    <div class="lang-note" title="Interfície en català">CA</div>
  </header>

  <main id="views">
    <section id="view-library" class="view"></section>
    <section id="view-routes" class="view"></section>
    <section id="view-competition" class="view"></section>
    <section id="view-records" class="view"></section>
    <section id="view-progress" class="view"></section>
    <section id="view-settings" class="view"></section>
  </main>
</div>

<script src="leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
